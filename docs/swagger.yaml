basePath: /api/v1
definitions:
  entities.Doctor:
    properties:
      created_at:
        type: string
      full_name:
        example: Иванов Иван Иванович
        type: string
      id:
        type: integer
      phone:
        example: "+79991234567"
        type: string
      updated_at:
        type: string
    type: object
  handlers.IncorrectFormatError:
    properties:
      response:
        properties:
          code:
            example: 400
            type: integer
          message:
            example: Неверный формат запроса
            type: string
        type: object
      status:
        description: error
        example: IncorrectFormatError
        type: string
    type: object
  handlers.InternalServerError:
    properties:
      response:
        properties:
          code:
            example: 500
            type: integer
          message:
            example: Внутренняя ошибка сервера
            type: string
        type: object
      status:
        description: error
        example: InternalServerError
        type: string
    type: object
  handlers.NotFoundError:
    properties:
      response:
        properties:
          code:
            example: 404
            type: integer
          message:
            example: Данные не найдены
            type: string
        type: object
      status:
        description: error
        example: NotFoundError
        type: string
    type: object
  handlers.ResultError:
    description: Generic error response format used across the API
    properties:
      response:
        description: Error details
        properties:
          code:
            description: |-
              HTTP status code
              @example 400
            type: integer
          message:
            description: |-
              Human-readable error message
              @example "Invalid request body"
            type: string
        type: object
      status:
        description: |-
          Always "error" for error responses
          @example "error"
        type: string
    type: object
  handlers.ResultResponse:
    description: Standard wrapper for successful responses
    properties:
      response:
        description: Response payload container
        properties:
          data:
            description: Actual data (optional)
          message:
            description: |-
              Human-readable success message
              @example "Patient created successfully"
            type: string
          type:
            description: |-
              Type of data: "object", "array", or "empty"
              @example "object"
              @enum object array empty
            type: string
        type: object
      status:
        description: |-
          Overall status of the response
          @example "success"
        type: string
    type: object
  handlers.ValidationError:
    properties:
      response:
        properties:
          code:
            example: 422
            type: integer
          message:
            example: Ошибка валидации
            type: string
        type: object
      status:
        description: error
        example: ValidationError
        type: string
    type: object
  models.AnalysisOrderItemResponse:
    properties:
      analysis:
        $ref: '#/definitions/models.AnalysisResponse'
      analysis_id:
        type: integer
      id:
        type: integer
      is_completed:
        type: boolean
    type: object
  models.AnalysisOrderResponse:
    properties:
      id:
        type: integer
      order_items:
        items:
          $ref: '#/definitions/models.AnalysisOrderItemResponse'
        type: array
      order_number:
        type: string
      total_amount:
        type: integer
    type: object
  models.AnalysisResponse:
    properties:
      code:
        type: string
      id:
        type: integer
      price:
        type: integer
      title:
        type: string
    type: object
  models.ContactInfoResponse:
    properties:
      address:
        type: string
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
  models.CreateContactInfoRequest:
    properties:
      address:
        type: string
      email:
        type: string
      phone:
        type: string
    required:
    - address
    - email
    - phone
    type: object
  models.CreatePatientRequest:
    properties:
      birth_date:
        type: string
      contact_info:
        allOf:
        - $ref: '#/definitions/models.CreateContactInfoRequest'
        description: Вложенные структуры
      division:
        type: string
      examination_type_id:
        type: integer
      examination_view_id:
        type: integer
      full_name:
        type: string
      group_id:
        type: integer
      harm_point_id:
        description: Обязательные связи
        type: integer
      is_male:
        type: boolean
      personal_info:
        $ref: '#/definitions/models.CreatePersonalInfoRequest'
      position:
        type: string
    required:
    - birth_date
    - contact_info
    - division
    - examination_type_id
    - examination_view_id
    - full_name
    - group_id
    - harm_point_id
    - is_male
    - personal_info
    - position
    type: object
  models.CreatePersonalInfoRequest:
    properties:
      doc_number:
        type: string
      doc_series:
        type: string
      document_type_id:
        type: integer
      oms:
        type: string
      snils:
        type: string
    required:
    - doc_number
    - doc_series
    - oms
    - snils
    type: object
  models.CreateTitrRequest:
    properties:
      date:
        type: string
      patient_id:
        type: integer
      titer_amount:
        type: string
      title_id:
        type: integer
    required:
    - date
    - patient_id
    - titer_amount
    - title_id
    type: object
  models.CreateVaccineRefusalRequest:
    properties:
      date:
        type: string
      patient_id:
        type: integer
      title_id:
        type: integer
    required:
    - date
    - patient_id
    - title_id
    type: object
  models.CreateVaccineRequest:
    properties:
      body_part_id:
        type: integer
      certificate_number_id:
        type: integer
      date:
        type: string
      dose_id:
        type: integer
      medication_id:
        type: integer
      method_id:
        type: integer
      number_id:
        type: integer
      patient_id:
        type: integer
      place_id:
        type: integer
      result_id:
        type: integer
      title_id:
        type: integer
    required:
    - body_part_id
    - certificate_number_id
    - date
    - dose_id
    - medication_id
    - method_id
    - number_id
    - patient_id
    - place_id
    - result_id
    - title_id
    type: object
  models.CreateVaccineWithdrawalRequest:
    properties:
      date:
        type: string
      med_withdrawl_num:
        type: integer
      patient_id:
        type: integer
      title_id:
        type: integer
    required:
    - date
    - med_withdrawl_num
    - patient_id
    - title_id
    type: object
  models.DoctorAuthResponse:
    description: Ответ с данными авторизованного врача
    properties:
      id:
        description: ID врача
        example: 1
        type: integer
      token:
        description: JWT токен
        example: eyJhbGciOi...
        type: string
    type: object
  models.DoctorLoginRequest:
    properties:
      password:
        description: Пароль
        example: "123"
        type: string
      phone:
        description: Логин (телефон)
        example: "+79622840765"
        type: string
    required:
    - password
    - phone
    type: object
  models.FieldDescriptor:
    properties:
      description:
        description: Описание (для тултипов)
        type: string
      enum:
        description: Справочники
        items:
          type: string
        type: array
      exclusive_maximum:
        description: <, не <=
        type: number
      exclusive_minimum:
        description: '>, не >='
        type: number
      format:
        description: Форматы (для UI и валидации)
        type: string
      max_items:
        type: integer
      max_length:
        type: integer
      maximum:
        type: number
      min_items:
        description: Для array
        type: integer
      min_length:
        description: Для string
        type: integer
      minimum:
        description: Для number/integer
        type: number
      multiple_of:
        description: кратность
        type: number
      name:
        type: string
      pattern:
        description: регулярное выражение
        type: string
      required:
        type: boolean
      tag:
        description: '"input", "select", "checkbox", "textarea"'
        type: string
      title:
        type: string
      type:
        description: '"string", "number", "integer", "boolean", "array"'
        type: string
    type: object
  models.FlgResponse:
    properties:
      date:
        type: string
      id:
        type: integer
      number:
        type: string
      organization:
        type: string
      photo_url:
        description: временный URL
        type: string
      result:
        type: string
    type: object
  models.HarmPointResponse:
    properties:
      id:
        type: integer
      value:
        type: string
    type: object
  models.ManagerResponse:
    properties:
      full_name:
        type: string
      phone:
        type: string
    type: object
  models.ManualResponse:
    properties:
      id:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  models.OrganizationShortResponse:
    properties:
      id:
        type: integer
      manager:
        $ref: '#/definitions/models.ManagerResponse'
      title:
        type: string
    type: object
  models.PatientGroupShortResponse:
    properties:
      code:
        example: "94928490"
        type: string
      created_at:
        example: "2023-05-15T14:30:00Z"
        type: string
      id:
        type: integer
      organization:
        example: medlab
        type: string
    type: object
  models.PatientResponse:
    properties:
      age:
        type: integer
      analysis_order:
        $ref: '#/definitions/models.AnalysisOrderResponse'
      birth_date:
        type: string
      contact_info:
        $ref: '#/definitions/models.ContactInfoResponse'
      division:
        type: string
      examination_type:
        description: Вложенные объекты
        type: integer
      examination_view:
        type: integer
      flg:
        $ref: '#/definitions/models.FlgResponse'
      full_name:
        type: string
      harm_point:
        $ref: '#/definitions/models.HarmPointResponse'
      id:
        type: integer
      is_male:
        type: boolean
      patient_group_id:
        type: integer
      personal_info:
        $ref: '#/definitions/models.PersonalInfoResponse'
      position:
        type: string
      receptions:
        items:
          $ref: '#/definitions/models.ReceptionResponse'
        type: array
      specializations:
        items:
          $ref: '#/definitions/models.SpecializationResponse'
        type: array
      statistics:
        $ref: '#/definitions/models.PatientStatisticsResponse'
      vaccines:
        description: Связанные коллекции
        items:
          $ref: '#/definitions/models.VaccineAllResponse'
        type: array
    type: object
  models.PatientStatisticsResponse:
    properties:
      completed_analysis_items:
        type: integer
      completed_receptions:
        type: integer
      id:
        type: integer
      total_analysis_orders:
        type: integer
      total_receptions:
        type: integer
    type: object
  models.PersonalInfoResponse:
    properties:
      doc_number:
        type: string
      doc_series:
        type: string
      document_type:
        type: integer
      id:
        type: integer
      oms:
        type: string
      snils:
        type: string
    type: object
  models.ReceptionResponse:
    properties:
      id:
        type: integer
      is_completed:
        type: boolean
      specialization:
        $ref: '#/definitions/models.SpecializationResponse'
      specialization_id:
        type: integer
      template:
        $ref: '#/definitions/models.ReceptionTemplateResponse'
    type: object
  models.ReceptionTemplateResponse:
    properties:
      code:
        type: string
      fields:
        items:
          $ref: '#/definitions/models.FieldDescriptor'
        type: array
      id:
        type: integer
    type: object
  models.SpecializationResponse:
    properties:
      id:
        type: integer
      title:
        type: string
    type: object
  models.UpdateAnalysisOrderItemDTO:
    properties:
      analysis_id:
        minimum: 1
        type: integer
      completed_at:
        type: string
      is_completed:
        type: boolean
    required:
    - analysis_id
    type: object
  models.UpdateAnalysisOrderRequest:
    properties:
      id:
        minimum: 1
        type: integer
      order_items:
        items:
          $ref: '#/definitions/models.UpdateAnalysisOrderItemDTO'
        type: array
      patient_id:
        minimum: 1
        type: integer
    required:
    - id
    - order_items
    - patient_id
    type: object
  models.UpdateDoctorRequest:
    description: Используется для изменения информации о враче
    properties:
      full_name:
        example: Иванов Иван Иванович
        type: string
      id:
        example: 1
        type: integer
      phone:
        example: "+79123456789"
        type: string
      specialization_id:
        example: 1
        type: integer
    type: object
  models.UpdateReceptionDataRequest:
    properties:
      id:
        minimum: 1
        type: integer
      template_schema_version:
        type: string
    required:
    - id
    type: object
  models.VaccineAllResponse:
    properties:
      date:
        type: string
      id:
        type: integer
      titer_amount_str:
        type: string
      title:
        type: integer
      type:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для работы с приёмами пациентов
  title: ClinicHub API
  version: 1.0.0
paths:
  /analysis/update:
    patch:
      consumes:
      - application/json
      description: Обновляет список анализов в направлении
      parameters:
      - description: Данные направления
        in: body
        name: info
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAnalysisOrderRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Направление успешно обновлено
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "404":
          description: Направление не найдено
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "422":
          description: Ошибка валидации данных
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Обновить направление на анализы
      tags:
      - AnalysisOrder
  /auth/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует врача по номеру телефона и паролю
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.DoctorLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DoctorAuthResponse'
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "401":
          description: Незарегистрирован
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/handlers.ResultError'
      summary: Вход в систему
      tags:
      - Auth
  /auth/logout:
    post:
      description: Уведомляет сервер о выходе (клиент должен удалить токен)
      produces:
      - application/json
      responses:
        "200":
          description: Успешный выход
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Выход из системы
      tags:
      - Auth
  /consent/medical-exam:
    get:
      description: Возвращает PDF-файл для ознакомления
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF документ
        "500":
          description: Ошибка при чтении файла
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Получить PDF согласия на медицинский осмотр
      tags:
      - Consent
  /consent/personal-data:
    get:
      description: Возвращает PDF-файл для ознакомления
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF документ
        "500":
          description: Ошибка при чтении файла
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Получить PDF согласия на обработку персональных данных
      tags:
      - Consent
  /consent/signature/{recep_id}:
    get:
      description: Возвращает ранее сохранённую подпись в формате Base64
      parameters:
      - description: ID пациента
        in: path
        name: recep_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Base64-кодированное изображение
          schema:
            type: string
        "400":
          description: Неверный ID пациента
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "404":
          description: Подпись не найдена
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Ошибка сервера
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Получить подпись пациента
      tags:
      - Consent
    post:
      consumes:
      - multipart/form-data
      description: Принимает изображение подписи и сохраняет его как подтверждение
        согласия
      parameters:
      - description: ID приёма
        in: path
        minimum: 1
        name: recep_id
        required: true
        type: integer
      - description: Изображение подписи (PNG/JPG)
        in: formData
        name: signature
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Подпись сохранена
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID или отсутствует файл
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Ошибка сервера
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Сохранить подпись пациента
      tags:
      - Consent
  /doctors/{doc_id}:
    put:
      consumes:
      - application/json
      description: Обновляет информацию о враче
      parameters:
      - description: Данные для обновления
        in: body
        name: info
        required: true
        schema:
          $ref: '#/definitions/models.UpdateDoctorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Обновленный врач
          schema:
            $ref: '#/definitions/entities.Doctor'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/handlers.IncorrectFormatError'
        "404":
          description: Врач не найден
          schema:
            $ref: '#/definitions/handlers.NotFoundError'
        "422":
          description: Ошибка валидации
          schema:
            $ref: '#/definitions/handlers.ValidationError'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/handlers.InternalServerError'
      security:
      - BearerAuth: []
      summary: Обновить данные врача
      tags:
      - Doctor
  /doctors/current:
    get:
      consumes:
      - application/json
      description: Возвращает данные врача по ID
      parameters:
      - description: ID врача
        in: path
        name: doc_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Данные врача
          schema:
            $ref: '#/definitions/entities.Doctor'
        "400":
          description: Некорректный ID
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "404":
          description: Врач не найден
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Получить врача по ID
      tags:
      - Doctor
  /flgs/:
    post:
      consumes:
      - multipart/form-data
      description: Загружает фото и создаёт запись
      parameters:
      - description: ID пациента
        in: formData
        name: patient_id
        required: true
        type: integer
      - description: Организация
        in: formData
        name: organization
        required: true
        type: string
      - description: Номер
        in: formData
        name: number
        required: true
        type: string
      - description: Результат
        in: formData
        name: result
        required: true
        type: string
      - description: Дата (YYYY-MM-DD)
        in: formData
        name: date
        required: true
        type: string
      - description: Фото (JPEG/PNG, до 10 МБ)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.FlgResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Создать флюорографию с фото
      tags:
      - Flg
  /manuals:
    get:
      description: Возвращает полный список справочных записей (типов анализов, вакцин,
        организаций и т.д.)
      produces:
      - application/json
      responses:
        "200":
          description: Список справочников
          schema:
            allOf:
            - $ref: '#/definitions/handlers.ResultResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.ManualResponse'
                  type: array
              type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handlers.ResultError'
      summary: Получить все справочники
      tags:
      - Manuals
  /organizations:
    get:
      consumes:
      - application/json
      description: Возвращает список организаций, связанных с текущим врачом, с возможностью
        поиска по названию и пагинацией
      parameters:
      - description: Поиск по названию организации
        in: query
        name: search
        type: string
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 5
        description: Количество записей на страницу
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
