          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить версию проекта
      tags:
      - Utils
securityDefinitions:
  BearerAuth:
    description: 'Type "Bearer" followed by a space and JWT token. Example: "Bearer
      your_jwt_token_here"'
    in: header
    name: Authorization
    type: apiKey
