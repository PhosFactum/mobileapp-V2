  /patient-groups/{group_id}/patients:
    get:
      consumes:
      - application/json
      description: |-
        Возвращает список всех существующих пациентов

        Работает фильтрация, сортировка и пагинация
      parameters:
      - description: |-
          Номер страницы
          (по умолчанию 1)
        in: query
        name: page
        type: integer
      - description: |-
          Количество записей на странице
          (по умолчанию 0 — без ограничения)
        in: query
        name: count
        type: integer
      - description: |-
          Фильтр в формате field.operation.value.
          Примеры:
          full_name.like.Иван - имя содержит 'Иван',
          birth_date.eq.1988-07-14 - точная дата рождения
        in: query
        name: filter
        type: string
      - description: |-
          Сортировка в формате field.direction.
          Примеры:
          full_name.asc - по алфавиту,
          id.desc - по убыванию ID пациента
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Список пациентов
          schema:
            allOf:
            - $ref: '#/definitions/handlers.ResultResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.PatientResponse'
                  type: array
              type: object
        "400":
          description: Некорректные данные
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/handlers.ResultError'
      security:
      - BearerAuth: []
      summary: Получить список всех пациентов
      tags:
      - Patient
  /patient-groups/by-organization/{organization_id}:
    get:
      consumes:
      - application/json
      description: Возвращает список групп пациентов, принадлежащих указанной организации,
        с возможностью поиска по коду группы и пагинацией
      parameters:
      - description: ID организации
        in: path
        name: organization_id
        required: true
        type: integer
      - description: Поиск по коду группы (case-insensitive)
        in: query
        name: search
        type: string
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 10
        description: Количество записей на страницу
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список групп
          schema:
            allOf:
            - $ref: '#/definitions/handlers.ResultResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.PatientGroupShortResponse'
                  type: array
              type: object
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/handlers.ResultError'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/handlers.ResultError'
      summary: Получить группы пациентов по организации
      tags:
      - PatientGroups
